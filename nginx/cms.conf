# Nginx configuration for Strapi CMS
# Domain: cms.opensourceweekend.org
#
# Deploy:
#   cp nginx/cms.conf /etc/nginx/sites-available/cms
#   ln -s /etc/nginx/sites-available/cms /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

# HTTP → HTTPS redirect (certbot will auto-fill the HTTPS block after SSL setup)
server {
    listen 80;
    listen [::]:80;
    server_name cms.opensourceweekend.org;

    # Allow Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Main Strapi CMS block
# (certbot will auto-add ssl_certificate lines after running certbot --nginx)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cms.opensourceweekend.org;

    # --- SSL certificates (filled in by certbot) ---
    # ssl_certificate     /etc/letsencrypt/live/cms.opensourceweekend.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cms.opensourceweekend.org/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- File upload limit (match Strapi's max upload size) ---
    client_max_body_size 100M;

    # --- Proxy to Strapi ---
    location / {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;

        # WebSocket support (needed for Strapi admin live reload)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client info to Strapi
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # --- Cache static assets served by Strapi ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, no-transform";
        access_log         off;
    }
}
